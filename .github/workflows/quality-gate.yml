name: quality-gate

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  quick-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt 2>&1 || { echo "PIP INSTALL FAILED"; pip install -r requirements.txt --dry-run 2>&1 | tail -20; exit 1; }

      - name: Verify environment
        run: |
          python --version
          node --version
          python -c "import sys; print('Python path:', sys.executable)"
          python -m pip list --format=columns | grep -E "numpy|pandas|tabpfn|nba|scikit|xgboost|lightgbm"
          ls web/app.js && echo "web/app.js EXISTS" || echo "web/app.js MISSING"

      - name: Run quality gate (quick)
        run: |
          python scripts/quality_gate.py --json
